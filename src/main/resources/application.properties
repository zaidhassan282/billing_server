# ===== SERVER =====
# Render injects $PORT; falls back to 8080 locally.
server.port=${PORT:8080}

# ===== POSTGRES DATABASE CONFIG =====
# Override these via environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/billing}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== JACKSON =====
# NOTE: Spring Boot 4 uses Jackson 3 (tools.jackson.* namespace) where
# WRITE_DATES_AS_TIMESTAMPS was removed from SerializationFeature.
# Both behaviours are configured programmatically in JacksonConfig.java.
spring.jackson.serialization.fail-on-empty-beans=false
