# ===== SERVER =====
# Render injects $PORT; falls back to 8080 locally.
server.port=${PORT:8080}

# ===== POSTGRES DATABASE CONFIG =====
# Override these via environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/billing}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===== CONNECTION POOL + THREADS (PERF-4) =====
# Defaults (Hikari 10, Tomcat 200) topple under any real concurrency.
# These numbers are sized for ~200 concurrent users; bump again before
# claiming higher.
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
server.tomcat.threads.max=400
server.tomcat.accept-count=200

# ===== AUTH (Phase 2) =====
# JWT signing secret (HS256). MUST be at least 32 bytes / 256 bits.
# Override via JWT_SECRET env var in any non-dev environment.
app.jwt.secret=${JWT_SECRET:dev-only-change-me-dev-only-change-me-dev-only-change-me-12345}
app.jwt.ttl-seconds=${JWT_TTL_SECONDS:86400}

# Bootstrap admin user — created on first boot when app_user is empty.
# Change these via env vars on a real server.
app.bootstrap.admin-email=${BOOTSTRAP_ADMIN_EMAIL:admin@finefusion.local}
app.bootstrap.admin-password=${BOOTSTRAP_ADMIN_PASSWORD:admin1234}

# ===== JACKSON =====
# NOTE: Spring Boot 4 uses Jackson 3 (tools.jackson.* namespace) where
# WRITE_DATES_AS_TIMESTAMPS was removed from SerializationFeature.
# Both behaviours are configured programmatically in JacksonConfig.java.
spring.jackson.serialization.fail-on-empty-beans=false
